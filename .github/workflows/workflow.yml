name: Backend CI

on:
  push:
    branches:
      - "main"
      - "development"
      - "feature/**"
  pull_request:
    branches:
      - "development"
      - "main"

permissions:
  contents: write
  pages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make gradlew executable
        working-directory: carpooling-backend
        run: chmod +x ./gradlew

      - name: Build & test (backend)
        working-directory: carpooling-backend
        run: ./gradlew build jacocoTestReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carpooling-backend-test-reports
          path: |
            carpooling-backend/**/build/reports/tests/test
            carpooling-backend/**/build/test-results/test

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: carpooling-backend-jar
          path: carpooling-backend/**/build/libs/*.jar

      - name: Deploy JaCoCo report to GitHub Pages (DEV)
        if: github.event_name == 'push' && github.ref == 'refs/heads/development'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: carpooling-backend/build/reports/jacoco/test/html
          destination_dir: jacoco/development
          keep_files: true

      - name: Deploy JaCoCo report to GitHub Pages (MAIN)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: carpooling-backend/build/reports/jacoco/test/html
          destination_dir: jacoco/main
          keep_files: true
  #
  release:
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # so tag action sees all tags

      - name: Download built JAR
        uses: actions/download-artifact@v4
        with:
          name: carpooling-backend-jar
          path: dist

      - name: Auto-bump version tag
        id: tag
        uses: hennejg/github-tag-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: "dist/**/*.jar"
